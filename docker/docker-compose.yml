version: '3.8'

services:
  knowledge-base:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./docs:/app/docs
    environment:
      - SITE_NAME=${SITE_NAME:-Assert Nexus}
      - SITE_DESCRIPTION=${SITE_DESCRIPTION:-个人知识库文档站}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
      - AI_NAME=${AI_NAME:-Mock}
      - DOCS_PATH=/app/docs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
